name: Build Installers

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mac:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: github.event_name != 'pull_request'
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MAC_CERTIFICATE_BASE64" ] || [ -z "$MAC_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "Missing macOS signing secrets. Configure MAC_CERTIFICATE_BASE64, MAC_CERTIFICATE_PASSWORD, and KEYCHAIN_PASSWORD."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "Certificate secret length: ${#MAC_CERTIFICATE_BASE64}"
          printf '%s' "$MAC_CERTIFICATE_BASE64" \
            | tr -d '\n\r\t ' \
            | sed "s/^'//;s/'$//;s/^\"//;s/\"$//" \
            | base64 -D > "$CERTIFICATE_PATH"
          echo "Certificate file size: $(wc -c < "$CERTIFICATE_PATH") bytes"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write Apple notarization key
        if: github.event_name != 'pull_request'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ]; then
            echo "Missing APPLE_API_KEY_BASE64 secret."
            exit 1
          fi
          echo "Apple API key secret length: ${#APPLE_API_KEY_BASE64}"
          printf '%s' "$APPLE_API_KEY_BASE64" \
            | tr -d '\n\r\t ' \
            | sed "s/^'//;s/'$//;s/^\"//;s/\"$//" \
            | base64 -D > "$RUNNER_TEMP/AuthKey.p8"
          echo "Apple API key file size: $(wc -c < "$RUNNER_TEMP/AuthKey.p8") bytes"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Build signed and notarized macOS installer
        if: github.event_name != 'pull_request'
        run: npm run build && npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_NAME: "JUNDE WU (A8DZ968K75)"
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Build unsigned macOS installer for pull requests
        if: github.event_name == 'pull_request'
        run: npm run dist:mac:${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-manager-macos-${{ matrix.arch }}
          path: |
            release/*.dmg
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-manager-windows-x64
          path: |
            release/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - mac
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.exe
          generate_release_notes: true
