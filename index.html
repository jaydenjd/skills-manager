<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Manager</title>
    <style>
      :root {
        font-family: "Avenir Next", "Hiragino Sans GB", "PingFang SC", sans-serif;
        color: #1f211d;
        background: #f4f1e8;
      }

      body {
        margin: 0;
        min-width: 1180px;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(31, 33, 29, 0.05) 1px, transparent 1px),
          linear-gradient(180deg, rgba(31, 33, 29, 0.05) 1px, transparent 1px),
          #f4f1e8;
        background-size: 28px 28px;
      }

      .boot-splash {
        height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .boot-card {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 28px 34px;
        border: 1px solid #d8d1c2;
        border-radius: 12px;
        background: rgba(255, 253, 247, 0.86);
        box-shadow: 0 18px 60px rgba(31, 33, 29, 0.12);
      }

      .boot-logo {
        width: 48px;
        height: 48px;
        position: relative;
        display: grid;
        place-items: center;
        border: 1px solid #1f211d;
        border-radius: 12px;
        background: linear-gradient(145deg, #fdfbf4 0%, #e9e3d4 100%);
        box-shadow: 7px 7px 0 #d2ff2f;
      }

      .boot-logo::before,
      .boot-logo::after {
        content: "";
        position: absolute;
        width: 24px;
        height: 14px;
        border: 2px solid #1f211d;
        border-radius: 6px;
        background: #fffdf7;
        transform: rotate(-8deg);
      }

      .boot-logo::before {
        top: 12px;
      }

      .boot-logo::after {
        top: 21px;
        background: #d2ff2f;
      }

      .boot-dots {
        display: inline-flex;
        gap: 5px;
      }

      .boot-dots i {
        width: 7px;
        height: 7px;
        border: 1px solid #1f211d;
        border-radius: 999px;
        background: #d2ff2f;
        animation: boot-bounce 0.9s ease-in-out infinite;
      }

      .boot-dots i:nth-child(2) {
        animation-delay: 0.12s;
      }

      .boot-dots i:nth-child(3) {
        animation-delay: 0.24s;
      }

      .boot-card strong {
        font-size: 17px;
      }

      .boot-card p {
        margin: 0;
        color: #72786d;
        font-size: 13px;
      }

      @keyframes boot-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.55;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <div class="boot-card">
          <div class="boot-logo" aria-hidden="true"></div>
          <strong>Skill Manager</strong>
          <p>正在准备本地 skill 管理器</p>
          <span class="boot-dots" aria-hidden="true"><i></i><i></i><i></i></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/App.jsx"></script>
  </body>
</html>
