<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Manager</title>
    <style>
      :root {
        font-family: "Avenir Next", "Hiragino Sans GB", "PingFang SC", sans-serif;
        color: #1f211d;
        background: #f4f1e8;
      }

      body {
        margin: 0;
        min-width: 1180px;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(31, 33, 29, 0.05) 1px, transparent 1px),
          linear-gradient(180deg, rgba(31, 33, 29, 0.05) 1px, transparent 1px),
          #f4f1e8;
        background-size: 28px 28px;
      }

      .boot-splash {
        height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .boot-card {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 28px 34px;
        border: 1px solid #d8d1c2;
        border-radius: 12px;
        background: rgba(255, 253, 247, 0.86);
        box-shadow: 0 18px 60px rgba(31, 33, 29, 0.12);
      }

      .boot-logo {
        width: 48px;
        height: 48px;
        display: block;
        border-radius: 14px;
        filter: drop-shadow(0 7px 16px rgba(15, 23, 42, 0.1));
      }

      .boot-logo .logo-tile {
        fill: #ffffff;
        stroke: #dfe4ea;
        stroke-width: 1.8;
      }

      .boot-logo .logo-s {
        fill: url("#bootLogoGradient");
      }

      .boot-logo .logo-dot-green {
        fill: #45bf87;
        stroke: #ffffff;
        stroke-width: 1.6;
      }

      .boot-logo .logo-dot-violet {
        fill: #8b7cff;
        stroke: #ffffff;
        stroke-width: 1.4;
      }

      .boot-logo .logo-dot-core {
        fill: #ffffff;
      }

      .boot-dots {
        display: inline-flex;
        gap: 5px;
      }

      .boot-dots i {
        width: 7px;
        height: 7px;
        border: 1px solid #1f211d;
        border-radius: 999px;
        background: #d2ff2f;
        animation: boot-bounce 0.9s ease-in-out infinite;
      }

      .boot-dots i:nth-child(2) {
        animation-delay: 0.12s;
      }

      .boot-dots i:nth-child(3) {
        animation-delay: 0.24s;
      }

      .boot-card strong {
        font-size: 17px;
      }

      .boot-card p {
        margin: 0;
        color: #72786d;
        font-size: 13px;
      }

      @keyframes boot-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.55;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <div class="boot-card">
          <svg class="boot-logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="bootLogoGradient" x1="18" y1="14" x2="48" y2="52" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5FE0D4" />
                <stop offset="0.55" stop-color="#45BF87" />
                <stop offset="1" stop-color="#8B7CFF" />
              </linearGradient>
            </defs>
            <rect x="4" y="4" width="56" height="56" rx="15" class="logo-tile" />
            <path
              class="logo-s"
              d="M21.1 20.2c3.2-4.4 9.3-6.3 16.6-5 4.8.8 8.3 2.7 10.5 5l-4.5 6c-1.9-1.9-4.8-3.3-8.2-3.5-3.8-.2-6.7.6-7.9 2.3-1.1 1.6.1 3 4.6 4.3l4.8 1.4c7.7 2.2 11.7 6.1 10.7 12.1-1.1 6.6-7.8 10.1-16.2 8.7-6.1-1-10.8-3.7-13.7-7.5l4.9-5.8c2.1 2.6 5.2 4.5 9.3 5.2 4.4.8 7.5-.4 8.1-2.6.5-1.8-1.1-3.2-5.3-4.4l-4.8-1.4c-7.9-2.3-11.7-6-10.5-12 .2-1 .8-2 1.6-2.8Z"
            />
            <circle cx="44" cy="25.2" r="3" class="logo-dot-green" />
            <circle cx="44" cy="25.2" r="1" class="logo-dot-core" />
            <circle cx="20.2" cy="40.6" r="2.7" class="logo-dot-violet" />
            <circle cx="20.2" cy="40.6" r="0.9" class="logo-dot-core" />
          </svg>
          <strong>Skill Manager</strong>
          <p>正在准备本地 skill 管理器</p>
          <span class="boot-dots" aria-hidden="true"><i></i><i></i><i></i></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/App.jsx"></script>
  </body>
</html>
